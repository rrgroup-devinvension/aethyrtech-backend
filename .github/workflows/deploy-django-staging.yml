name: 🚀 Deploy Django Backend (Staging)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Django to EC2

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Upload Code to Server
      - name: Upload project to server
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "."
          target: "/var/www/vhosts/staging.aethyrtech.ai/aethyrtech-backend/"
          rm: true

      # 3️⃣ Setup & Restart Services
      - name: Setup Django & Restart Services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e

            echo "📂 Navigating to project..."
            cd /var/www/vhosts/staging.aethyrtech.ai/aethyrtech-backend

            echo "🐍 Activating virtualenv..."
            source venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install -r requirements.txt

            echo "🛠 Running migrations..."
            python manage.py migrate --noinput

            echo "📁 Collecting static files..."
            python manage.py collectstatic --noinput

            echo "🔄 Restarting Gunicorn..."
            sudo systemctl restart aethyrtech-gunicorn

            echo "🔄 Restarting Celery..."
            sudo systemctl restart aethyrtech-celery || true

            echo "🌐 Restarting Nginx..."
            sudo systemctl restart nginx

            echo "⏳ Waiting for services..."
            sleep 5

            echo "📊 Checking service status..."
            sudo systemctl status aethyrtech-gunicorn --no-pager
            sudo systemctl status aethyrtech-celery --no-pager
