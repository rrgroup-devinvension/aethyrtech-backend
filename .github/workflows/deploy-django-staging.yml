name: 🚀 Deploy Django + Celery (Staging)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies (optional validation)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Upload project to EC2
      - name: Upload project
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "."
          target: "/opt/aethyrtech/django-staging"

      # 5️⃣ Restart services on EC2
      - name: Restart Django + Celery
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/aethyrtech/django-staging

            echo "Pull latest code..."
            git pull origin staging || true

            echo "Activate virtualenv..."
            source venv/bin/activate

            echo "Install dependencies..."
            pip install -r requirements.txt

            echo "Run migrations..."
            python manage.py migrate --noinput

            echo "Collect static..."
            python manage.py collectstatic --noinput

            echo "Restart services..."
            sudo systemctl restart django-staging
            sudo systemctl restart celery-worker-staging
            sudo systemctl restart celery-beat-staging

            echo "Status check:"
            sudo systemctl status django-staging --no-pager
            sudo systemctl status celery-worker-staging --no-pager
            sudo systemctl status celery-beat-staging --no-pager