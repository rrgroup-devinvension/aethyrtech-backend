name: 🚀 Deploy Spring Boot Backend (Staging)

on:
  push:
    branches:
      - staging

env:
  JAVA_VERSION: "21"

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build & Deploy to EC2

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      # 3️⃣ Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 4️⃣ Build the application
      - name: Build the application
        run: ./mvnw clean package -DskipTests

      # 5️⃣ Upload JAR to EC2 ✅ no tar, direct file
      - name: Upload JAR to EC2
        uses: appleboy/scp-action@v0.1.5
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: "./target/*.jar"
          target: "/opt/alfjobs/staging"
          strip_components: 0
          tar_tmp_path: "false"

      # 6️⃣ Restart Spring Boot service on EC2
      - name: Restart Spring Boot service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            echo "Stopping service..."
            sudo systemctl stop alfjobs-staging || true

            echo "Moving and applying JAR..."
            sudo mv /opt/alfjobs/staging/target/*.jar /opt/alfjobs/staging/alfjobs-backend.jar
            sudo chown ubuntu:ubuntu /opt/alfjobs/staging/alfjobs-backend.jar

            echo "Starting service..."
            sudo systemctl start alfjobs-staging

            sleep 5
            sudo systemctl status alfjobs-staging --no-pager

      # # ✅ 7️⃣ Health Check using exposed port (not EC2 internal)
      # - name: Health Check
      #   run: |
      #     sleep 10
      #     curl -f http://${{ secrets.STAGING_HOST }}:8080/actuator/health || exit 1

# 🔐 GitHub Secrets Required:
# - STAGING_HOST:       Public IP of your Staging EC2 Server
# - STAGING_USER:       SSH user (Example: ubuntu)
# - STAGING_SSH_KEY:    Private SSH key for connecting to EC2 (.pem)
